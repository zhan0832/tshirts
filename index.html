<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>T-Shirts</title>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from "https://esm.sh/react@19";
    import ReactDOM from "https://esm.sh/react-dom@19/client";
    import tshirts from './t-shirts.js'

    const root = ReactDOM.createRoot(document.getElementById("root"));

    function App() {
  const [shirts, setShirts] = useState(tshirts);

  return (
    <div>
      <h1>T-Shirt Store</h1>

      <ul>
        {shirts.map((shirt) => (
          <li key={shirt.title}>
            <h2>{shirt.title}</h2>

            <img
              src={`images/${shirt.image}`}
              alt={shirt.title}
              width="200"
            />

            <p>Price: ${shirt.price}</p>
            {shirt.stock > 0 ? (<p>Stock: {shirt.stock}</p>) : (<p>Out of Stock</p>)}
          </li>
        ))}
      </ul>
    </div>
  );
}

root.render(<App />);

    



  </script>
</body>
</html>
